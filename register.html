<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - CYNEX</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/background.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="auth-page">
    <header>
      <div class="container">
        <div class="logo">
          <a href="index.html">CYNEX</a>
        </div>
        <nav>
          <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Đăng nhập</a></li>
            <li><a href="register.html" class="active">Đăng ký</a></li>
          </ul>
        </nav>
        <div class="menu-toggle">
          <i class="fas fa-bars"></i>
        </div>
      </div>
    </header>

    <div class="auth-container">
      <div class="auth-box">
        <h2>Đăng ký tài khoản</h2>
        <form class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-with-icon">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                id="email"
                placeholder="Nhập email của bạn"
                required
              />
            </div>
          </div>
          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <div class="input-with-icon">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                placeholder="Nhập mật khẩu"
                required
              />
              <i class="fas fa-eye toggle-password"></i>
            </div>
          </div>
          <div class="form-group">
            <label for="confirm_password">Xác nhận mật khẩu</label>
            <div class="input-with-icon">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="confirm_password"
                placeholder="Xác nhận mật khẩu"
                required
              />
              <i class="fas fa-eye toggle-password"></i>
            </div>
          </div>
          <button type="submit" class="auth-button">Đăng ký</button>
        </form>
        <div class="auth-footer">
          <span>Đã có tài khoản?</span>
          <a href="login.html">Đăng nhập ngay</a>
        </div>
      </div>
    </div>

    <footer>
      <div class="container">
        <p>© 2025 - CYNEX. All Rights Reserved.</p>
      </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/background.js"></script>
  </body>
</html>
