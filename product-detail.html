<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Detail - CYNEX</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/background.css" />
    <link rel="stylesheet" href="css/product-detail.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="logo">
          <a href="index.html">CYNEX</a>
        </div>
        <nav>
          <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Đăng nhập</a></li>
            <li><a href="register.html">Đăng ký</a></li>
            <li><a href="admin.html">Admin</a></li>
          </ul>
        </nav>
        <div class="menu-toggle">
          <i class="fas fa-bars"></i>
        </div>
      </div>
    </header>

    <section class="product-detail">
      <div class="container">
        <div class="breadcrumb">
          <a href="index.html">Home</a> / <span>Loading...</span>
        </div>

        <div class="product-showcase">
          <div class="product-image">
            <div class="placeholder">Loading...</div>
          </div>

          <div class="product-info">
            <h1 id="product-title">Loading...</h1>
            <p class="product-short-description" id="product-short-desc">
              Loading...
            </p>

            <div class="pricing" id="pricing-section" style="display: none">
              <div class="old-price" id="old-price">0 đ</div>
              <div class="current-price" id="current-price">0 đ</div>
              <div class="discount-tag" id="discount-tag">Tiết kiệm 0%</div>
            </div>

            <div class="variants">
              <div class="variant-group">
                <h3>Gói sản phẩm</h3>
                <div class="variant-options" id="package-variants">
                  <button class="variant-btn">Loading...</button>
                </div>

                <!-- Package Description - moved inside variant-group -->
                <div class="package-description" id="package-description">
                  <p id="package-description-text"></p>
                </div>
              </div>

              <div class="variant-group">
                <h3>Thời hạn</h3>
                <div class="variant-options" id="duration-variants">
                  <button class="variant-btn disabled">Chọn gói trước</button>
                </div>
              </div>
            </div>

            <!-- Contact Button -->
            <div class="contact-action">
              <a
                href="https://zalo.me/0935177318"
                target="_blank"
                class="zalo-contact-btn"
              >
                <i class="fas fa-comments"></i>
                <span>Liên hệ Zalo để đặt hàng</span>
                <div class="btn-effect"></div>
              </a>
            </div>
          </div>
        </div>

        <!-- Product Information Section -->
        <div class="product-info-section">
          <h2>Thông tin sản phẩm</h2>
          <div
            class="product-description-content"
            id="product-description-content"
          >
            <p>Đang tải thông tin sản phẩm...</p>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <div class="container">
        <p>© 2025 - CYNEX. All Rights Reserved.</p>
      </div>
    </footer>

    <script type="module" src="js/product-detail.js"></script>
    <script src="js/background.js"></script>
  </body>
</html>
