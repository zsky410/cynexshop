<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CYNEX - Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .modal {
        display: flex;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        background: rgba(13, 21, 43, 0.95);
        border-radius: 10px;
        padding: 20px;
        width: 90%;
        max-width: 600px;
        max-height: 90vh;
        overflow-y: auto;
        border: 1px solid rgba(89, 118, 255, 0.3);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .modal-header h2 {
        color: #fff;
        margin: 0;
      }

      .close-btn {
        background: none;
        border: none;
        color: #fff;
        font-size: 24px;
        cursor: pointer;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        color: #fff;
        margin-bottom: 5px;
        font-weight: 500;
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid rgba(89, 118, 255, 0.3);
        border-radius: 5px;
        background: rgba(13, 21, 43, 0.7);
        color: #fff;
        font-family: "Montserrat", sans-serif;
      }

      .pricing-section {
        border: 1px solid rgba(89, 118, 255, 0.3);
        border-radius: 5px;
        padding: 15px;
        margin: 20px 0;
      }

      .pricing-section h3 {
        color: #fff;
        margin-top: 0;
      }

      .pricing-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr auto;
        gap: 10px;
        margin-bottom: 10px;
        align-items: center;
      }

      .pricing-row select,
      .pricing-row input {
        padding: 8px;
        border: 1px solid rgba(89, 118, 255, 0.3);
        border-radius: 3px;
        background: rgba(13, 21, 43, 0.7);
        color: #fff;
      }

      .remove-pricing {
        background: rgba(255, 76, 76, 0.2);
        color: #ff4c4c;
        border: 1px solid rgba(255, 76, 76, 0.3);
        border-radius: 3px;
        padding: 8px;
        cursor: pointer;
      }

      .form-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 20px;
      }

      .admin-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-family: "Montserrat", sans-serif;
        font-weight: 600;
      }

      .admin-btn.success {
        background: linear-gradient(135deg, #5976ff, #3a3af1);
        color: #fff;
      }

      .admin-btn.cancel {
        background: rgba(13, 21, 43, 0.7);
        color: #fff;
        border: 1px solid rgba(89, 118, 255, 0.3);
      }

      .products-list {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      .products-list th,
      .products-list td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid rgba(89, 118, 255, 0.2);
        color: #fff;
      }

      .products-list th {
        background: rgba(8, 14, 30, 0.7);
        font-weight: 600;
      }

      .product-info-cell {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .product-thumbnail {
        width: 60px;
        height: 60px;
        border-radius: 5px;
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 18px;
      }

      .product-placeholder {
        background: rgba(89, 118, 255, 0.2);
        border: 1px solid rgba(89, 118, 255, 0.3);
      }

      .product-name {
        font-weight: 600;
        margin-bottom: 5px;
      }

      .product-short-desc {
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
      }

      .product-actions {
        display: flex;
        gap: 10px;
      }

      .action-btn {
        padding: 8px 12px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .action-btn.edit {
        background: rgba(89, 118, 255, 0.2);
        color: #5976ff;
        border: 1px solid rgba(89, 118, 255, 0.3);
      }

      .action-btn.delete {
        background: rgba(255, 76, 76, 0.2);
        color: #ff4c4c;
        border: 1px solid rgba(255, 76, 76, 0.3);
      }

      .status-active {
        color: #28a745;
        font-weight: 600;
      }

      .status-inactive {
        color: #dc3545;
        font-weight: 600;
      }

      .notification {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 15px 20px;
        border-radius: 5px;
        color: white;
        font-weight: 600;
        z-index: 1001;
        animation: slideIn 0.3s ease-out;
      }

      .notification.success {
        background: rgba(40, 167, 69, 0.9);
        border: 1px solid rgba(40, 167, 69, 0.3);
      }

      .notification.error {
        background: rgba(220, 53, 69, 0.9);
        border: 1px solid rgba(220, 53, 69, 0.3);
      }

      .notification.info {
        background: rgba(13, 21, 43, 0.8);
        border: 1px solid rgba(89, 118, 255, 0.3);
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <div class="logo">
          <a href="index.html">CYNEX</a>
        </div>
        <nav>
          <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="admin.html" class="active">Admin</a></li>
          </ul>
        </nav>
        <div class="menu-toggle">
          <i class="fas fa-bars"></i>
        </div>
      </div>
    </header>

    <section class="admin-dashboard">
      <div class="container">
        <h1 class="admin-title">Quản lý sản phẩm</h1>

        <div class="admin-panel">
          <div class="admin-sidebar">
            <ul class="admin-menu">
              <li class="active">
                <a href="#product-form">Thêm sản phẩm mới</a>
              </li>
              <li><a href="#product-list">Danh sách sản phẩm</a></li>
            </ul>
          </div>

          <div class="admin-content">
            <div id="product-form" class="admin-section active">
              <h2>Thêm sản phẩm mới</h2>
              <form id="add-product-form">
                <div class="form-group">
                  <label for="product-name">Tên sản phẩm</label>
                  <input type="text" id="product-name" name="name" required />
                </div>

                <div class="form-group">
                  <label for="product-image">Ảnh sản phẩm</label>
                  <input
                    type="file"
                    id="product-image"
                    name="image"
                    accept="image/*"
                  />
                  <div class="image-preview" id="image-preview"></div>
                </div>

                <div class="form-group">
                  <label for="product-type">Loại sản phẩm</label>
                  <select id="product-type" name="type" required>
                    <option value="">-- Chọn loại sản phẩm --</option>
                    <option value="NÂNG CẤP CHÍNH CHỦ">
                      Nâng cấp chính chủ
                    </option>
                    <option value="CẤP TÀI KHOẢN">Cấp tài khoản</option>
                    <option value="KEY ACTIVE">Key active</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="product-short-desc">Mô tả ngắn</label>
                  <textarea
                    id="product-short-desc"
                    name="shortDescription"
                    rows="2"
                    required
                  ></textarea>
                </div>

                <div class="form-group">
                  <label for="product-description">Thông tin sản phẩm</label>
                  <textarea
                    id="product-description"
                    name="description"
                    rows="5"
                    required
                  ></textarea>
                </div>

                <div class="form-group packages-container">
                  <label>Các gói sản phẩm và thời hạn</label>
                  <div id="variants-list">
                    <div class="variant-item">
                      <div class="variant-header">
                        <input
                          type="text"
                          name="variant-name[]"
                          placeholder="Tên gói (VD: Premium, Pro, Edu)"
                          required
                          class="variant-name-input"
                        />
                        <input
                          type="text"
                          name="variant-description[]"
                          placeholder="Mô tả gói (VD: Phiên bản cao cấp)"
                          class="variant-description-input"
                        />
                        <button type="button" class="remove-variant-btn">
                          <i class="fas fa-times"></i> Xóa gói
                        </button>
                      </div>

                      <div class="packages-for-variant">
                        <label>Các thời hạn cho gói này:</label>
                        <div class="packages-list">
                          <div class="package-item">
                            <input
                              type="text"
                              name="package-duration[]"
                              placeholder="Thời hạn (VD: 1 tháng, 6 tháng)"
                              required
                            />
                            <input
                              type="number"
                              name="package-price[]"
                              placeholder="Giá (VD: 69000)"
                              required
                            />
                            <input
                              type="number"
                              name="package-original-price[]"
                              placeholder="Giá gốc (VD: 100000)"
                              required
                            />
                            <button type="button" class="remove-package-btn">
                              <i class="fas fa-times"></i>
                            </button>
                          </div>
                        </div>
                        <button
                          type="button"
                          class="add-package-btn btn-secondary"
                        >
                          <i class="fas fa-plus"></i> Thêm thời hạn
                        </button>
                      </div>
                    </div>
                  </div>
                  <button
                    type="button"
                    id="add-variant-btn"
                    class="btn-secondary"
                  >
                    <i class="fas fa-plus"></i> Thêm gói mới
                  </button>
                </div>

                <div class="form-actions">
                  <button type="submit" class="btn-primary">
                    Lưu sản phẩm
                  </button>
                  <button type="reset" class="btn-secondary">Xóa form</button>
                </div>
              </form>
            </div>

            <div id="product-list" class="admin-section">
              <h2>Danh sách sản phẩm</h2>
              <div class="product-table-container">
                <table class="product-table">
                  <thead>
                    <tr>
                      <th>Ảnh</th>
                      <th>Tên sản phẩm</th>
                      <th>Mô tả ngắn</th>
                      <th>Loại</th>
                      <th>Số gói</th>
                      <th>Thao tác</th>
                    </tr>
                  </thead>
                  <tbody id="product-table-body">
                    <!-- Products will be loaded here -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <div class="container">
        <p>© 2025 - CYNEX. All Rights Reserved.</p>
      </div>
    </footer>

    <!-- Firebase SDK -->
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
